<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="google-site-verification" content="Q8L870RfEF2sEVIZ2X1-XJs5t3lp8J1tFGD87fTUg58" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>CURSED SQUAD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; width: 100%; overflow: hidden; }
      body { background: #07070d; color: #e4e4f0; font-family: 'Share Tech Mono', monospace; }
      /* Phaser canvas sits behind React UI overlay */
      #phaser-container {
        position: fixed;
        inset: 0;
        z-index: 0;
      }
      #root {
        position: relative;
        z-index: 1;
        pointer-events: none; /* UI components opt back in individually */
      }
    </style>
  </head>
  <body>
    <div id="phaser-container"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
